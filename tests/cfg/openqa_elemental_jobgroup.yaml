---

.default_products: &default_products
  distri: sle

.common_settings: &common_settings
  K8S: rke2
  CONSOLE: ttyS0
  TEST_PASSWORD: Elemental@R00t

.common_test_settings: &common_test_settings
  <<: *common_settings
  HDDSIZEGB: '30'
  QEMUCPUS: '4'
  QEMURAM: '8192'
  YAML_SCHEDULE: schedule/elemental3/os_image.yaml

.common_microos_boot_settings: &common_microos_boot_settings
  BOOTFROM: disk
  CONTAINER_RUNTIMES: podman
  DESKTOP: textmode
  EXCLUDE_MODULES: suseconnect_scc
  HDD_1: 'SL-Micro.%ARCH%-6.2-Default-Updated.qcow2'
  HDDSIZEGB: '30'
  KEEP_GRUB_TIMEOUT: '0'
  VIDEOMODE: text

.generate_settings: &generate_settings
  <<: *common_settings
  <<: *common_microos_boot_settings
  IMG_NAME: 'elemental-%BUILD%-%ARCH%-%TESTED_CMD%'
  KERNEL_CMD_LINE: 'console=%CONSOLE%'
  QEMURAM: '2048'
  YAML_SCHEDULE: schedule/elemental3/generate.yaml

.test_raw_settings: &test_raw_settings
  <<: *common_test_settings
  HDD_1: 'elemental-%BUILD%-%ARCH%-%TESTED_CMD%.qcow2'
  IMAGE_TYPE: raw
  TEST_TYPE: test_image

.test_iso_settings: &test_iso_settings
  <<: *common_test_settings
  BOOTFROM: disk
  IMAGE_TYPE: iso
  ISO: 'elemental-%BUILD%-%ARCH%-%TESTED_CMD%.iso'
  TEST_TYPE: test_iso

.k8s_test_settings: &k8s_test_settings
  EXPECTED_NM_CONNECTIVITY: none
  NICTYPE: tap
  NODES_LIST: node01
  # TESTS_TO_RUN: validatecluster,deployrancher
  TESTS_TO_RUN: validatecluster
  TEST_TYPE: k8s_validation

.node_k8s_validation_settings: &node_k8s_validation_settings
  <<: *common_test_settings
  <<: *k8s_test_settings
  HDD_1: 'elemental-%BUILD%-%ARCH%-%TESTED_CMD%.qcow2'
  PARALLEL_WITH: master

.master_k8s_validation_settings: &master_k8s_validation_settings
  <<: *common_settings
  <<: *common_microos_boot_settings
  <<: *k8s_test_settings
  CERTMANAGER_VERSION: v1.19.1
  +DISTRI: sle-micro
  +HDD_1: 'openSUSE-MicroOS.%ARCH%-Updated.qcow2'
  HOSTNAME: master
  RANCHER_VERSION: v2.13.2
  TEST_FRAMEWORK_REPO: https://github.com/ldevulder/distros-test-framework@fix-support-uc-os-image
  YAML_SCHEDULE: schedule/elemental3/master.yaml

defaults:
  aarch64:
    machine: aarch64-virtio
    priority: 50
  x86_64:
    machine: uefi-virtio
    priority: 50
    settings:
      QEMUCPU: host

products:
  sle-16.0-uc-osimage:
    <<: *default_products
    flavor: UnifiedCore-OS-Image
    version : '16.0'
  sle-16.0-uc-isoimage:
    <<: *default_products
    flavor: UnifiedCore-ISO-Image
    version : '16.0'
  sle-16.0-uc-release_manifest:
    <<: *default_products
    flavor: UnifiedCore-Release-Manifest
    version : '16.0'

scenarios:
  aarch64:
    sle-16.0-uc-osimage:
      - generate_with_install:
          testsuite: null
          settings:
            <<: *generate_settings
            TESTED_CMD: install
      - generate_with_build_installer_iso:
          testsuite: null
          settings:
            <<: *generate_settings
            ISO_CMD_LINE: 'console=%CONSOLE% enforcing=0'
            TESTED_CMD: build_installer_iso
      - test_with_install:
          testsuite: null
          settings:
            <<: *test_raw_settings
            TESTED_CMD: install
            START_AFTER_TEST: generate_with_%TESTED_CMD%
      - test_with_build_installer_iso:
          testsuite: null
          settings:
            <<: *test_iso_settings
            TESTED_CMD: build_installer_iso
            START_AFTER_TEST: generate_with_%TESTED_CMD%
    sle-16.0-uc-isoimage:
      - extract_iso:
          testsuite: null
          settings:
            <<: *generate_settings
            TESTED_CMD: extract_iso
      - test_extract_iso:
          testsuite: null
          settings:
            <<: *test_iso_settings
            TESTED_CMD: extract_iso
            START_AFTER_TEST: '%TESTED_CMD%'
    sle-16.0-uc-release_manifest:
      - generate_iso:
          testsuite: null
          settings:
            <<: *generate_settings
            CRYPTO_POLICY: fips
            IMAGE_TYPE: iso
            TESTED_CMD: customize
      - generate_raw:
          testsuite: null
          settings:
            <<: *generate_settings
            IMAGE_TYPE: raw
            TESTED_CMD: customize
      - generate_raw_recovery:
          testsuite: null
          settings:
            <<: *generate_settings
            IMAGE_TYPE: raw
            TEMPLATE: build-tpl_recovery.tar.gz
            TESTED_CMD: customize_recovery
      - test_iso_fips:
          testsuite: null
          settings:
            <<: *test_iso_settings
            CRYPTO_POLICY: fips
            TESTED_CMD: customize
            START_AFTER_TEST: generate_iso
      - test_raw:
          testsuite: null
          settings:
            <<: *test_raw_settings
            TESTED_CMD: customize
            START_AFTER_TEST: generate_raw
      - test_raw_recovery:
          testsuite: null
          settings:
            <<: *test_raw_settings
            TEMPLATE: build-tpl_recovery.tar.gz
            TESTED_CMD: customize_recovery
            TEST_TYPE: 'recovery'
            START_AFTER_TEST: generate_raw_recovery
      - master:
          testsuite: null
          settings:
            <<: *master_k8s_validation_settings
            TESTED_CMD: customize
            START_AFTER_TEST: generate_raw
      - node01:
          testsuite: null
          settings:
            <<: *node_k8s_validation_settings
            HOSTNAME: node01
            TESTED_CMD: customize
  x86_64:
    sle-16.0-uc-osimage:
      - generate_with_install:
          testsuite: null
          settings:
            <<: *generate_settings
            TESTED_CMD: install
      - generate_with_build_installer_iso:
          testsuite: null
          settings:
            <<: *generate_settings
            ISO_CMD_LINE: 'console=%CONSOLE% enforcing=0'
            TESTED_CMD: build_installer_iso
      - test_with_install:
          testsuite: null
          settings:
            <<: *test_raw_settings
            TESTED_CMD: install
            START_AFTER_TEST: generate_with_%TESTED_CMD%
      - test_with_build_installer_iso:
          testsuite: null
          settings:
            <<: *test_iso_settings
            TESTED_CMD: build_installer_iso
            START_AFTER_TEST: generate_with_%TESTED_CMD%
    sle-16.0-uc-isoimage:
      - extract_iso:
          testsuite: null
          settings:
            <<: *generate_settings
            TESTED_CMD: extract_iso
      - test_extract_iso:
          testsuite: null
          settings:
            <<: *test_iso_settings
            TESTED_CMD: extract_iso
            START_AFTER_TEST: '%TESTED_CMD%'
    sle-16.0-uc-release_manifest:
      - generate_iso:
          testsuite: null
          settings:
            <<: *generate_settings
            CRYPTO_POLICY: fips
            IMAGE_TYPE: iso
            TESTED_CMD: customize
      - generate_raw:
          testsuite: null
          settings:
            <<: *generate_settings
            IMAGE_TYPE: raw
            TESTED_CMD: customize
      - generate_raw_recovery:
          testsuite: null
          settings:
            <<: *generate_settings
            IMAGE_TYPE: raw
            TEMPLATE: build-tpl_recovery.tar.gz
            TESTED_CMD: customize_recovery
      - test_iso_fips:
          testsuite: null
          settings:
            <<: *test_iso_settings
            CRYPTO_POLICY: fips
            TESTED_CMD: customize
            START_AFTER_TEST: generate_iso
      - test_raw:
          testsuite: null
          settings:
            <<: *test_raw_settings
            TESTED_CMD: customize
            START_AFTER_TEST: generate_raw
      - test_raw_recovery:
          testsuite: null
          settings:
            <<: *test_raw_settings
            TEMPLATE: build-tpl_recovery.tar.gz
            TESTED_CMD: customize_recovery
            TEST_TYPE: 'recovery'
            START_AFTER_TEST: generate_raw_recovery
      - master:
          testsuite: null
          settings:
            <<: *master_k8s_validation_settings
            TESTED_CMD: customize
            START_AFTER_TEST: generate_raw
      - node01:
          testsuite: null
          settings:
            <<: *node_k8s_validation_settings
            HOSTNAME: node01
            TESTED_CMD: customize
